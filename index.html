<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古樹物語 | 樹木生態觀測</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #eef2ed; /* 淺森林綠背景 */
            color: #2c3e2e; /* 深森林綠文字 */
        }
        .tree-container {
            max-width: 600px;
            margin: 40px auto;
            background: #ffffff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(44, 62, 46, 0.15);
        }
        .tree-image {
            width: 100%;
            height: 380px;
            object-fit: cover;
            background-color: #ced4da;
        }
        .content { padding: 35px; }
        .forest-badge { 
            background: #3e5a42; /* 森林正綠 */
            color: #fff; 
            padding: 6px 16px; 
            border-radius: 50px; 
            font-size: 0.85rem; 
            letter-spacing: 1px;
        }
        .tree-title {
            color: #1e3020;
            font-weight: 700;
            margin-top: 15px;
        }
        /* 資訊表格美化 */
        .info-table {
            background-color: #f7f9f6;
            border-radius: 12px;
            padding: 15px;
            margin: 25px 0;
            border-left: 5px solid #5a785e; /* 大地綠飾條 */
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #d1ded3;
        }
        .info-item:last-child { border-bottom: none; }
        .info-label { font-weight: bold; color: #5a785e; }
        .info-value { color: #2c3e2e; }
        
        /* QR Code 樣式 */
        #qrcode img { 
            border: 6px solid #fff; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
        }
    </style>
</head>
<body>

    <div class="tree-container">
        <img src="tree.jpg" alt="樹木照片" class="tree-image">
        
        <div class="content">
            <div class="text-center">
                <span class="forest-badge">NATURAL HERITAGE</span>
                <h2 class="tree-title mb-3">千年神木 (紅檜)</h2>
                <p class="text-muted text-start" style="line-height: 1.8;">
                    <strong>樹木介紹：</strong><br>
                    這棵紅檜巨木生長於雲霧繚繞的高山森林之中，歷經數百年的風雨洗禮，依然挺拔蒼翠。其木質帶有獨特的清香，是森林生態系統中不可或缺的重要支柱，守護著這片土地的生物多樣性。
                </p>
            </div>
            
            <div class="info-table">
                <div class="info-item">
                    <span class="info-label">🌳 估計樹齡</span>
                    <span class="info-value">約 1,200 年</span>
                </div>
                <div class="info-item">
                    <span class="info-label">📍 原產地</span>
                    <span class="info-value">台灣阿里山山脈</span>
                </div>
                <div class="info-item">
                    <span class="info-label">📏 樹高 / 胸圍</span>
                    <span class="info-value">43 公尺 / 14.5 公尺</span>
                </div>
            </div>
            
            <hr class="my-4" style="border-top: 1px solid #d1ded3;">
            
            <div class="text-center">
                <p class="small text-secondary mb-3">掃描 QR Code 帶朋友一起認識這棵樹</p>
                <div id="qrcode" class="d-flex justify-content-center"></div>
            </div>
        </div>
    </div>

    <script>
        // 自動生成當前網址的 QR Code
        new QRCode(document.getElementById("qrcode"), {
            text: window.location.href,
            width: 150,
            height: 150,
            colorDark : "#1e3020", /* 使用深綠色作為條碼色，比純黑更有質感 */
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
